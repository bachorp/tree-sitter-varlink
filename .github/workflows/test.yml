on:
  push: null

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: tree-sitter/setup-action/cli@eeb902ac2f1be576edc296309872cf476a209b7f # v2
        with:
          tree-sitter-ref: v0.26.8
          rust-toolchain: 1.94.1

      - run: tree-sitter generate && { [ "$(git status --porcelain)" = "" ] || { git status --porcelain; git diff; exit 1; } }
      - uses: tree-sitter/parser-test-action@05f6ce7c7e54603c45cd87ed926725dc870bcc63 # v3
        with:
          test-rust: true
